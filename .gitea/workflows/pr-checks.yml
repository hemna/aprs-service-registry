name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          # Get the version from the base branch (master)
          git fetch origin master
          BASE_VERSION=$(git show origin/master:pyproject.toml | grep -E '^version\s*=' | sed 's/.*"\(.*\)"/\1/')
          PR_VERSION=$(grep -E '^version\s*=' pyproject.toml | sed 's/.*"\(.*\)"/\1/')

          echo "Base version (master): $BASE_VERSION"
          echo "PR version: $PR_VERSION"

          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::error::Version has not been bumped. Please update the version in pyproject.toml."
            echo "Current version on master: $BASE_VERSION"
            exit 1
          fi

          # Verify the PR version is greater than base using Python
          python3 -c "
          from packaging.version import Version
          base = Version('$BASE_VERSION')
          pr = Version('$PR_VERSION')
          if pr <= base:
              print(f'::error::PR version ({pr}) must be greater than master version ({base})')
              exit(1)
          print(f'Version bump OK: {base} -> {pr}')
          " 2>/dev/null || {
            # Fallback if packaging isn't available — simple string comparison
            if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
              echo "::error::Version not bumped"
              exit 1
            fi
            echo "Version changed: $BASE_VERSION -> $PR_VERSION (string comparison)"
          }

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 isort

      - name: Run flake8
        run: |
          flake8 aprs_service_registry/ --max-line-length=120 --extend-ignore=E203,W503,F401,F824,E302,N801

      - name: Check import ordering
        run: |
          isort --check-only --diff aprs_service_registry/ || echo "::warning::Import ordering issues found (non-blocking)"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev deps
        run: |
          pip install -e ".[dev]"
          pip install httpx2

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
