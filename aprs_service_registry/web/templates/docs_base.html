<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Documentation{% endblock %} - APRS Service Registry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous">
  <link rel="stylesheet" href="/static/main.css">
  <script>
    // Apply theme immediately to prevent flash
    (function() {
      var theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container-fluid">
      <div class="header-inner">
        <div>
          <h1 class="site-title">APRS Service Registry</h1>
        </div>
        <nav class="header-nav">
          <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle dark/light theme">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 006.002-2.082 9.718 9.718 0 003-3.916z" />
            </svg>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
            </svg>
          </button>
        </nav>
      </div>
    </div>
  </header>

  <div class="docs-layout">
    <aside class="docs-sidebar">
      <nav class="docs-nav">
        <div class="docs-nav-section">
          <span class="docs-nav-label">Docs</span>
          <a href="/about" class="docs-nav-item{% if active_page == 'about' %} active{% endif %}">About</a>
          <a href="/guide" class="docs-nav-item{% if active_page == 'guide' %} active{% endif %}">Guide</a>
          <a href="/developers" class="docs-nav-item{% if active_page == 'developers' %} active{% endif %}">Developers</a>
          <a href="/service-types" class="docs-nav-item{% if active_page == 'service-types' %} active{% endif %}">Service Types</a>
          <a href="/faq" class="docs-nav-item{% if active_page == 'faq' %} active{% endif %}">FAQ</a>
        </div>
        
        <div class="docs-nav-section">
          <span class="docs-nav-label">API Reference</span>
          <a href="/docs" class="docs-nav-item">Swagger UI</a>
          <a href="/redoc" class="docs-nav-item">ReDoc</a>
        </div>
        
        <div class="docs-nav-section docs-nav-section--bottom">
          <a href="/" class="docs-nav-item docs-nav-item--home">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Home
          </a>
        </div>
      </nav>
    </aside>

    <main class="docs-content">
      <article class="docs-article">
        <header class="docs-header">
          <h1>{% block page_title %}{% endblock %}</h1>
          {% block page_subtitle %}<p class="docs-subtitle"></p>{% endblock %}
        </header>

        {% block quick_start %}{% endblock %}

        <div class="docs-body">
          {% block content %}{% endblock %}
        </div>
      </article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
          crossorigin="anonymous"></script>
  <script>
(function() {
  'use strict';

  // Theme toggle
  var themeToggle = document.getElementById('theme-toggle');
  if (themeToggle) {
    themeToggle.addEventListener('click', function() {
      var html = document.documentElement;
      var currentTheme = html.getAttribute('data-theme');
      var newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      if (newTheme === 'light') {
        html.removeAttribute('data-theme');
      } else {
        html.setAttribute('data-theme', 'dark');
      }
      
      localStorage.setItem('theme', newTheme);
    });
  }

  // Copy to clipboard for code blocks
  document.querySelectorAll('.btn-copy').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var block = this.closest('.code-block');
      var pre = block ? block.querySelector('pre code') : null;
      if (!pre) return;
      var text = pre.textContent;
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied';
        btn.classList.add('btn-copy--done');
        setTimeout(function() {
          btn.textContent = 'Copy';
          btn.classList.remove('btn-copy--done');
        }, 1600);
      });
    });
  });

  // Mobile sidebar toggle
  var sidebarToggle = document.getElementById('sidebar-toggle');
  var sidebar = document.querySelector('.docs-sidebar');
  if (sidebarToggle && sidebar) {
    sidebarToggle.addEventListener('click', function() {
      sidebar.classList.toggle('docs-sidebar--open');
    });
  }
})();
  </script>
</body>
</html>
